<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task 5 – Event Registration Form</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Outfit:wght@400;500;600&display=swap');
    :root {
      --bg: #f7f3ee;
      --card: #fff;
      --ink: #111;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --border: #d1d5db;
      --muted: #6b7280;
      --success-bg: #ecfdf5;
      --success: #059669;
      --error: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1.5rem;
    }
    .wrapper { width: 100%; max-width: 560px; }

    /* ---- Page Title ---- */
    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.05;
      margin-bottom: 0.4rem;
    }
    .page-sub {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    /* ---- Form Card ---- */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    /* ---- Field Groups ---- */
    .field { margin-bottom: 1.4rem; }
    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }
    label .req { color: var(--error); margin-left: 2px; }
    input[type="text"],
    input[type="email"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    textarea { resize: vertical; min-height: 110px; line-height: 1.6; }

    /* Select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 1rem; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* ---- Row (2 cols) ---- */
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 480px) { .row { grid-template-columns: 1fr; } }

    /* ---- Submit Button ---- */
    .btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--accent);
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s, transform 0.15s;
      margin-top: 0.5rem;
    }
    .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    /* ---- Output Confirmation ---- */
    output {
      display: block;
      margin-top: 1.2rem;
      padding: 1rem 1.2rem;
      background: var(--success-bg);
      border: 1.5px solid #a7f3d0;
      border-radius: 8px;
      color: var(--success);
      font-weight: 600;
      font-size: 0.95rem;
      animation: fadeIn 0.4s ease;
    }
    output:empty { display: none; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="wrapper">

  <h1 class="page-title">Register for<br>an Event</h1>
  <p class="page-sub">Fill in your details to secure your spot at a community event.</p>

  <div class="form-card">
    <form id="regForm" onsubmit="handleSubmit(event)" novalidate>

      <!-- Name & Email -->
      <div class="row">
        <div class="field">
          <label for="name">Full Name <span class="req">*</span></label>
          <!-- autofocus on first field -->
          <input type="text" id="name" name="name"
                 placeholder="Jane Doe"
                 required autofocus />
        </div>
        <div class="field">
          <label for="email">Email <span class="req">*</span></label>
          <input type="email" id="email" name="email"
                 placeholder="jane@email.com"
                 required />
        </div>
      </div>

      <!-- Date & Event Type -->
      <div class="row">
        <div class="field">
          <label for="date">Event Date <span class="req">*</span></label>
          <input type="date" id="date" name="date" required />
        </div>
        <div class="field">
          <label for="eventType">Event Type <span class="req">*</span></label>
          <div class="select-wrap">
            <select id="eventType" name="eventType" required>
              <option value="" disabled selected>Select event…</option>
              <option value="farmers-market">Farmers Market</option>
              <option value="cultural-festival">Cultural Festival</option>
              <option value="marathon">City Marathon</option>
              <option value="tech-fair">Tech Fair</option>
              <option value="cinema-night">Cinema Night</option>
              <option value="harvest-festival">Harvest Festival</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Message / Textarea -->
      <div class="field">
        <label for="message">Additional Message</label>
        <textarea id="message" name="message"
                  placeholder="Any special requirements or notes…"></textarea>
      </div>

      <button type="submit" class="btn">✓ Register Now</button>

      <!-- <output> element displays confirmation -->
      <output id="confirmation" for="regForm"></output>

    </form>
  </div>
</div>

<script>
  function handleSubmit(e) {
    e.preventDefault();
    const form = e.target;

    const name      = form.name.value.trim();
    const email     = form.email.value.trim();
    const date      = form.date.value;
    const eventType = form.eventType.value;

    // Basic validation feedback
    if (!name || !email || !date || !eventType) {
      document.getElementById('confirmation').textContent = '';
      alert('Please fill in all required fields.');
      return;
    }

    // Format date nicely
    const displayDate = new Date(date + 'T00:00:00').toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    const eventLabel = form.eventType.options[form.eventType.selectedIndex].text;

    // Display confirmation using <output>
    const out = document.getElementById('confirmation');
    out.textContent =
      `✅ Thank you, ${name}! You're registered for "${eventLabel}" on ${displayDate}. A confirmation will be sent to ${email}.`;
  }
</script>
</body>
</html>
