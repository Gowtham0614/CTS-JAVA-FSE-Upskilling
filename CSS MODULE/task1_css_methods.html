<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 1 – CSS Inclusion Methods</title>

  <!-- Internal (Embedded) CSS: body background defined here -->
  <style>
    /* Body styles */
    body {
      background-color: #f0f4f8;
      font-family: Georgia, serif;
      margin: 0;
      padding: 20px;
    }

    /* Section heading styles */
    h2 {
      color: #2c3e50;
      border-bottom: 2px solid #3498db;
      padding-bottom: 6px;
    }

    /* Paragraph base styles */
    p {
      color: #555;
      line-height: 1.7;
    }

    /* Card container */
    .eventCard {
      background: #fff;
      border: 1px solid #dce3ea;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      max-width: 600px;
    }

    /* Banner ID styles */
    #mainHeader {
      background: #2c3e50;
      color: #fff;
      padding: 30px 20px;
      border-radius: 8px;
      margin-bottom: 30px;
    }
  </style>

  <!-- External CSS: link to shared reusable stylesheet -->
  <!-- In a real project all reusable styles would live in styles.css -->
  <!-- <link rel="stylesheet" href="styles.css" /> -->
</head>
<body>

  <!-- Banner using ID selector #mainHeader -->
  <header id="mainHeader">
    <!-- INLINE STYLE: makes this heading red -->
    <h1 style="color: red; margin: 0;">Local Community Event Portal</h1>
    <p>Connecting neighbours, one event at a time.</p>
  </header>

  <h2>Upcoming Events</h2>

  <!-- Event cards using class selector .eventCard -->
  <div class="eventCard">
    <h3>Summer Farmers Market</h3>
    <p>Join us every Saturday morning at Town Square for fresh local produce.</p>
  </div>

  <div class="eventCard">
    <h3>Community Clean-Up Drive</h3>
    <p>Help keep our neighbourhood beautiful. Meet at the park entrance at 8 AM.</p>
  </div>

  <!--
    NOTES ON CSS METHODS DEMONSTRATED:
    1. INLINE  – style="color: red;" on the <h1> above
    2. INTERNAL – <style> block in <head> defines body background,
                  #mainHeader, .eventCard, h2, and p styles
    3. EXTERNAL – The commented-out <link> tag shows how you would
                  link styles.css; move all reusable rules there
  -->

</body>
</html>
